<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🇻🇳 越式風情・西貢光影</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* * 🎨 越南主題配色：法式黃、熱帶綠、咖啡褐 */
        :root {
            --c-bg-top: #ffecb3;   /* 溫暖法式黃 */
            --c-bg-bot: #fff9c4;   /* 淺黃 */
            --c-primary: #5d4037;  /* 咖啡褐文字 */
            
            /* 分類色 */
            --c-food: #ffab91;    /* 蝦醬紅：美食 */
            --c-spot: #a5d6a7;    /* 熱帶綠：景點 */
            --c-move: #b0bec5;    /* 機車灰：移動 */
            --c-shop: #fff59d;    /* 亮黃：購物 */
            --c-hotel: #ce93d8;   /* 舒適紫：住宿 */

            --shadow-card: 5px 5px 0px rgba(93, 64, 55, 0.15);
            --font-main: 'Zen Maru Gothic', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: var(--font-main);
            color: var(--c-primary);
            background: linear-gradient(180deg, var(--c-bg-top) 0%, #ffffff 60%, var(--c-bg-bot) 100%);
            min-height: 100vh;
            padding-bottom: 120px;
            overflow-x: hidden;
        }

        /* 🍃 落葉特效 (模擬熱帶氣息) */
        .leaf-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
        .leaf {
            position: absolute; top: -20px;
            background: #81c784;
            border-radius: 0 50% 0 50%; /* 葉子形狀 */
            opacity: 0.6;
            animation: fall-leaf linear infinite;
        }
        @keyframes fall-leaf {
            0% { transform: translateY(0) rotate(0deg) translateX(0); }
            100% { transform: translateY(110vh) rotate(360deg) translateX(50px); }
        }

        /* 導航 */
        .navbar {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 420px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border: 2px solid #fff; border-radius: 60px;
            box-shadow: 0 10px 25px rgba(93, 64, 55, 0.2);
            z-index: 999;
            display: flex; justify-content: space-evenly; padding: 8px 0;
        }
        .nav-item {
            text-align: center; text-decoration: none; color: var(--c-primary);
            font-size: 0.8rem; font-weight: 800;
            display: flex; flex-direction: column; align-items: center;
            padding: 5px; border-radius: 10px; transition: background 0.2s;
        }
        .nav-item:active { background: #ffe082; transform: scale(0.95); }
        .nav-icon { font-size: 1.4rem; margin-bottom: 2px; }

        .container { max-width: 800px; margin: 0 auto; padding: 20px 20px 60px; position: relative; z-index: 1; }

        /* Header */
        header { text-align: center; padding: 50px 0 30px; }
        .main-title {
            font-size: 2.2rem; font-weight: 900; color: #3e2723;
            text-shadow: 3px 3px 0px #fff; margin-bottom: 10px; letter-spacing: 2px;
        }
        .sub-title {
            background: #fff; padding: 8px 20px; border-radius: 30px;
            font-size: 1rem; font-weight: 800; color: #ff6f00;
            box-shadow: var(--shadow-card); transform: rotate(-2deg); display: inline-block;
            border: 2px solid #ffcc80;
        }

        /* 天氣卡 */
        .weather-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px; padding: 20px; margin-bottom: 30px;
            border: 4px solid #fff; box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }
        .weather-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 2px dashed #ffe082; padding-bottom: 15px; }
        .w-icon { font-size: 3.5rem; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.1)); }
        .w-temp-group { text-align: right; display: flex; align-items: center; gap: 15px; }
        .temp-box { text-align: center; }
        .temp-val { font-size: 2rem; font-weight: 900; line-height: 1; }
        .temp-label { font-size: 0.9rem; font-weight: 700; opacity: 0.7; margin-top: 5px; }
        .t-high { color: #d84315; } .t-low { color: #0277bd; }
        .weather-info { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
        .w-badge {
            background: #fff8e1; padding: 8px 12px; border-radius: 10px;
            font-size: 1rem; font-weight: 700; color: #5d4037; flex: 1; text-align: center;
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }

        /* 行程時間軸 */
        .day-section { margin-bottom: 60px; }
        .day-title {
            background: var(--c-primary); color: #fff; padding: 12px 25px;
            border-radius: 15px; font-size: 1.3rem; font-weight: 900;
            display: inline-block; margin-bottom: 25px; box-shadow: 5px 5px 0 rgba(0,0,0,0.2);
            transform: rotate(-1deg);
        }

        .timeline-container { padding-left: 25px; border-left: 6px dashed #bdbdbd; margin-left: 15px; }
        
        .timeline-card {
            position: relative; background: #fff; border-radius: 18px; padding: 18px; margin-bottom: 25px;
            border: 3px solid transparent; box-shadow: var(--shadow-card);
            transition: transform 0.1s; cursor: pointer; overflow: visible;
        }
        .timeline-card:active { transform: scale(0.98); box-shadow: 2px 2px 0 rgba(0,0,0,0.1); }
        .timeline-card::before {
            content: ''; position: absolute; left: -37px; top: 25px;
            width: 18px; height: 18px; border-radius: 50%;
            background: #fff; border: 4px solid var(--c-primary); z-index: 1;
        }

        /* 類型樣式 - 越南版 */
        .c-food { border-color: var(--c-food); } .c-food::before { border-color: var(--c-food); background: #ffe0b2; }
        .c-spot { border-color: var(--c-spot); } .c-spot::before { border-color: var(--c-spot); background: #c8e6c9; }
        .c-move { border-color: var(--c-move); } .c-move::before { border-color: var(--c-move); background: #cfd8dc; }
        .c-shop { border-color: var(--c-shop); } .c-shop::before { border-color: var(--c-shop); background: #fff9c4; }
        .c-hotel { border-color: var(--c-hotel); } .c-hotel::before { border-color: var(--c-hotel); background: #e1bee7; }

        .card-inner { display: flex; align-items: flex-start; gap: 15px; }
        .t-time-group { display: flex; flex-direction: column; align-items: center; min-width: 65px; }
        .t-time-big { font-size: 1.4rem; font-weight: 900; color: #5d4037; line-height: 1; }
        .t-ampm { font-size: 0.8rem; font-weight: 700; color: #8d6e63; }
        .t-detail { flex: 1; z-index: 2; position: relative; }
        .t-head { font-size: 1.25rem; font-weight: 800; color: #3e2723; margin-bottom: 8px; line-height: 1.3; }
        .t-desc { font-size: 1rem; color: #6d4c41; line-height: 1.6; font-weight: 500; }
        .t-note-mini { 
            display: inline-block; background: #ffecb3; color: #e65100; 
            font-size: 0.8rem; padding: 2px 8px; border-radius: 4px; margin-top: 6px; font-weight: 700;
        }

        /* 貼圖 */
        .sticker-box { position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; overflow: hidden; border-radius: 15px; }
        .sticker {
            position: absolute; font-size: 2.2rem; filter: drop-shadow(2px 2px 0px rgba(0,0,0,0.1)); opacity: 0.95;
        }
        .s-pos-1 { top: -15px; right: -10px; transform: rotate(15deg); }
        .s-pos-2 { bottom: -10px; right: 10px; transform: rotate(-10deg) scale(0.8); }
        .s-pos-3 { top: 5px; right: 40px; transform: rotate(5deg) scale(0.6); opacity: 0.5; }

        /* 行李清單 */
        .checklist-wrapper { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .cl-category { background: #fff; border-radius: 15px; padding: 20px; box-shadow: var(--shadow-card); border-top: 5px solid #a5d6a7; }
        .cl-title { font-size: 1.2rem; font-weight: 900; margin-bottom: 15px; color: #33691e; }
        .cl-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px dashed #eee; font-size: 1rem; cursor: pointer; color: #558b2f; font-weight: 500; }
        .cl-item.checked { color: #81c784; text-decoration: line-through; }

        /* 總叮嚀 */
        .tips-section { background: #fff; border-radius: 20px; padding: 25px; border: 4px solid #ffab91; margin-top: 40px; box-shadow: var(--shadow-card); }
        .tips-title { color: #d84315; font-size: 1.5rem; font-weight: 900; text-align: center; margin-bottom: 20px; border-bottom: 2px dashed #ffab91; padding-bottom: 15px; }
        .tip-item { margin-bottom: 12px; font-size: 1rem; line-height: 1.6; padding-left: 25px; position: relative; font-weight: 500; }
        .tip-item::before { content: '🛵'; position: absolute; left: 0; top: 0; }

        /* Modal */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(62, 39, 35, 0.9); z-index: 2000; display: none; justify-content: center; align-items: center; padding: 20px; }
        .modal-box { background: #fff; width: 100%; max-width: 500px; border-radius: 24px; padding: 30px; position: relative; animation: popUp 0.3s; }
        @keyframes popUp { from{transform:scale(0.8); opacity:0;} to{transform:scale(1); opacity:1;} }
        .m-map-btn { display:block; background:#ff7043; color:#fff; text-align:center; padding:15px; border-radius:15px; text-decoration:none; font-weight:900; font-size:1.1rem; margin-top: 20px; box-shadow: 0 4px 0 #d84315; }
        /* 🏠 回首頁懸浮按鈕 */
.home-btn {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 1000; /* 確保它浮在所有貼紙和特效上面 */
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(5px);
    padding: 10px 18px;
    border-radius: 30px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    text-decoration: none;
    color: var(--c-primary); /* 會自動跟隨該頁面的主題色變色！ */
    font-weight: 900;
    font-size: 0.9rem;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: transform 0.2s;
    border: 2px solid #fff;
}

.home-btn:hover {
    transform: scale(1.05);
    background: #fff;
}

.home-btn:active {
    transform: scale(0.95);
}
    </style>

</head>

    <nav class="navbar">

    <div class="modal-overlay" id="modal">
        <div class="modal-box">
            <button onclick="closeModal()" style="position:absolute; right:20px; top:20px; border:none; background:none; font-size:1.5rem; cursor:pointer;">✕</button>
            <h2 id="m-title" style="color:#3e2723; margin-bottom:5px; font-size:1.6rem;">標題</h2>
            <div id="m-time" style="color:#8d6e63; font-weight:700; margin-bottom:15px; font-size:0.9rem;"></div>
            
            <div style="background:#fff8e1; padding:15px; border-radius:12px; margin-bottom:15px; font-size:1.05rem; line-height:1.6;" id="m-desc">內容</div>
            
            <div id="m-note-box" style="display:none; margin-bottom:15px;">
                <span style="background:#ffcc80; color:#e65100; padding:4px 10px; border-radius:8px; font-size:0.85rem; font-weight:bold;">重點筆記</span>
                <p id="m-note" style="margin-top:8px; font-weight:700; color:#e65100;"></p>
            </div>

        </div>
    </div>

        for(let i=0; i<20; i++){ 
            const div = document.createElement('div');
            div.className = 'leaf';
            div.style.left = Math.random()*100 + 'vw';
            const size = Math.random()*15 + 10; 
            div.style.width = size + 'px';
            div.style.height = size + 'px';
            div.style.animationDuration = (Math.random()*10+5)+'s';
            div.style.animationDelay = Math.random()*5+'s';
            leafContainer.appendChild(div);
        }

        // 📅 行程資料庫 (根據文字檔 100% 還原)

            },
